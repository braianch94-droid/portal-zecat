name: Sync repos y re-deploy

on:
  schedule:
    - cron: '0 8 * * *'   # todos los días a las 8:00 AM UTC (5 AM Argentina)
  workflow_dispatch:       # también se puede lanzar manualmente desde GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    name: Sync + Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Logistica4
        run: |
          rm -rf Logistica4
          git clone --depth 1 https://github.com/braianch94-droid/Logistica4.git Logistica4
          rm -rf Logistica4/.git

      - name: Sync dashboard-productividad-zecat
        run: |
          rm -rf dashboard-productividad-zecat
          git clone --depth 1 https://github.com/braianch94-droid/dashboard-productividad-zecat.git dashboard-productividad-zecat
          rm -rf dashboard-productividad-zecat/.git

      - name: Sync reporte-personal-zecat
        run: |
          rm -rf reporte-personal-zecat
          git clone --depth 1 https://github.com/braianch94-droid/reporte-personal-zecat.git reporte-personal-zecat
          rm -rf reporte-personal-zecat/.git

      - name: Sync inventario-ciclico-zecat
        run: |
          rm -rf inventario-ciclico-zecat
          git clone --depth 1 https://github.com/braianch94-droid/inventario-ciclico-zecat.git inventario-ciclico-zecat
          rm -rf inventario-ciclico-zecat/.git

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "sync: actualizar módulos [$(date +'%Y-%m-%d')]"
          git push

      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: sync-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: portal-zecat
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

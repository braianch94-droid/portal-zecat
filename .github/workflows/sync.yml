name: Sync repos y re-deploy

on:
  schedule:
    - cron: '0 8 * * *'   # todos los días a las 8:00 AM UTC (5 AM Argentina)
  workflow_dispatch:       # también se puede lanzar manualmente desde GitHub

permissions:
  contents: write
  deployments: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    name: Sync + Deploy Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync Logistica4
        run: |
          rm -rf Logistica4
          git clone --depth 1 https://github.com/braianch94-droid/Logistica4.git Logistica4
          rm -rf Logistica4/.git

      # dashboard-productividad-zecat se actualiza directamente via Actualizar-Dashboard.bat
      # (NO sincronizar desde el repo fuente — el bat pushea index.html al portal directamente)

      - name: Sync reporte-personal-zecat
        run: |
          rm -rf reporte-personal-zecat
          git clone --depth 1 https://github.com/braianch94-droid/reporte-personal-zecat.git reporte-personal-zecat
          rm -rf reporte-personal-zecat/.git

      # inventario-ciclico-zecat se actualiza directamente via Actualizar_Dashboard.ps1
      # (NO sincronizar desde el repo fuente — el script pushea index.html al portal directamente)

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "sync: actualizar módulos [$(date +'%Y-%m-%d')]"
          git push

      - name: Deploy to Cloudflare Pages
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_CF_ACCOUNT: "a82c7c254fd10a364f6190856b8696c2"
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$RAW_CF_TOKEN" | tr -d '\357\273\277\r\n ')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$RAW_CF_ACCOUNT" | tr -d '\357\273\277\r\n ')"
          npx wrangler pages project create portal-zecat-op --production-branch=master || echo "proyecto ya existe (ok)"
          npx wrangler pages deploy . --project-name=portal-zecat-op --branch=master --commit-dirty=true

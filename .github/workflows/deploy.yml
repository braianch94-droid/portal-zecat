name: Deploy to GitHub Pages + Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-github:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Set Cloudflare production branch to master
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request
          token = os.environ['CF_TOKEN'].lstrip('﻿').strip()
          account_id = os.environ['CF_ACCOUNT_ID'].lstrip('﻿').strip()
          base = f'https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/portal-zecat'
          try:
            req = urllib.request.Request(base, data=json.dumps({'production_branch': 'master'}).encode(),
              method='PATCH', headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'})
            with urllib.request.urlopen(req) as r:
              d = json.loads(r.read())
            print('production_branch:', d.get('success'), d.get('errors'))
          except Exception as e:
            print('WARN:', repr(e))
          EOF
      # Deploy con wrangler (lee wrangler.toml y ata el binding D1 a la Function)
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy . --project-name=portal-zecat --branch=master --commit-dirty=true

name: Deploy to GitHub Pages + Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-github:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Set Cloudflare production branch to master
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 << 'EOF'
          import subprocess, os, json
          token = os.environ['CF_TOKEN'].lstrip('﻿').strip()
          account_id = os.environ['CF_ACCOUNT_ID'].lstrip('﻿').strip()
          r = subprocess.run([
            'curl', '-s', '-X', 'PATCH',
            f'https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/portal-zecat',
            '-H', f'Authorization: Bearer {token}',
            '-H', 'Content-Type: application/json',
            '-d', '{"production_branch":"master"}'
          ], capture_output=True, text=True)
          try:
            d = json.loads(r.stdout)
            print('success:', d.get('success'))
            if not d.get('success'):
              print('errors:', d.get('errors'))
          except Exception as e:
            print('parse error:', e, '| raw:', r.stdout[:200])
          EOF
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: portal-zecat
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: master

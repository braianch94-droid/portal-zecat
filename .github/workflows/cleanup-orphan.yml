name: Borrar proyecto Pages huerfano (one-shot)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Eliminar 'portal-zecat' huerfano de la cuenta gmail
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_CF_ACCOUNT: "a82c7c254fd10a364f6190856b8696c2"
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$RAW_CF_TOKEN" | tr -d '\357\273\277\r\n ')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$RAW_CF_ACCOUNT" | tr -d '\357\273\277\r\n ')"
          echo "=== proyectos Pages (antes) ==="
          npx wrangler pages project list || true
          npx wrangler pages project delete portal-zecat -y || echo "no se pudo borrar (quizas no existe)"
          echo "=== proyectos Pages (despues) ==="
          npx wrangler pages project list || true
